name: devpulse

services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: devpulse
      POSTGRES_PASSWORD: devpulse
      POSTGRES_DB: devpulse
    ports:
      - "5434:5432"
    volumes:
      - devpulse_postgres_data:/var/lib/postgresql/data
      - ./postgres/01-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./postgres/02-bundles.sql:/docker-entrypoint-initdb.d/02-bundles.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devpulse -d devpulse"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6381:6379"
    volumes:
      - devpulse_redis_data:/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - devpulse_minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/devpulse &&
      mc anonymous set download local/devpulse
      "

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - devpulse_qdrant_data:/qdrant/storage

  pipeline:
    build:
      context: ..
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://devpulse:devpulse@postgres:5432/devpulse
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: devpulse
      LLM_BASE_URL: http://host.docker.internal:1234/v1
      LLM_PROFILE: korean
      QDRANT_URL: http://qdrant:6333
      PYTHONUNBUFFERED: "1"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ..:/app
      - devpulse_pipeline_output:/app/output
    working_dir: /app
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      redis:
        condition: service_started
    profiles:
      - pipeline

  dagster:
    build:
      context: ..
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://devpulse:devpulse@postgres:5432/devpulse
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: devpulse
      LLM_BASE_URL: http://host.docker.internal:1234/v1
      LLM_PROFILE: korean
      QDRANT_URL: http://qdrant:6333
      PYTHONUNBUFFERED: "1"
      DAGSTER_HOME: /app/.dagster
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ..:/app
      - devpulse_pipeline_output:/app/output
      - devpulse_dagster_home:/app/.dagster
    working_dir: /app
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      redis:
        condition: service_started
    command: dagster dev -m dagster_defs.definitions -h 0.0.0.0 -p 3000
    profiles:
      - dagster

volumes:
  devpulse_postgres_data:
  devpulse_redis_data:
  devpulse_minio_data:
  devpulse_qdrant_data:
  devpulse_pipeline_output:
  devpulse_dagster_home:
